<body>

<div id="editor">

  <canvas id="canvas" width="600" height="300"></canvas>

  <div id="bottomBar">
  <div id="timeline">
    <canvas id="timelineCanvas" width="516" height="24"></canvas>
  </div>
  <div id="framesSlider">
    <div id="scrollPrev"></div>
    <div id="scrollBar">
      <div id="scrollSlider"></div>
    </div>
    <div id="scrollNext"></div>
    </div>
    <div id="toolbar">
      <div id="btnAdd"></div>
      <div id="btnDelete"></div>
      <div id="btnPlay"></div>
      <div id="btnPause"></div>
      <div id="btnSave"></div>
      <div id="btnPencil"></div>
      <div id="btnEraser"></div>

      <div id="btnEyedropper"></div>

      <div id="btnSize1"></div>
      <div id="btnSize2"></div>
      <div id="btnSize3"></div>
      <div id="btnSize4"></div>
      <div id="btnSize5"></div>

      <div id="btnColorBlack"><div class="colorInner" style="background:#000000;"></div></div>
      <div id="btnColorRed"><div class="colorInner" style="background:#ff0000;"></div></div>
      <div id="btnColorCustom"></div>
      <input type="color" id="colorPicker" value="#ffffff" disabled style="opacity:0; position:absolute; width:24px; height:24px; left:349.3px; top:62px; cursor:pointer; pointer-events:auto;">
    </div>
  </div>

</div>

<div id="saveDialog" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; align-items:center; justify-content:center;">
  <div style="background:#555555; border-radius:8px; padding:24px 28px; width:340px; font-family:Arial, sans-serif; font-size:13px; color:#fff; position:relative;">

    <div style="margin-bottom:12px; display:flex; align-items:center;">
      <label style="width:100px; color:#ddd;">Name:</label>
      <input id="saveDialogName" type="text" style="flex:1; padding:5px 8px; border:none; border-radius:4px; font-size:13px;" placeholder=""/>
    </div>

    <div style="margin-bottom:12px; display:flex; align-items:center;">
      <label style="width:100px; color:#ddd;">Keywords:</label>
      <input id="saveDialogKeywords" type="text" style="flex:1; padding:5px 8px; border:none; border-radius:4px; font-size:13px;" placeholder=""/>
    </div>

    <div style="margin-bottom:12px; display:flex; align-items:flex-start;">
      <label style="width:100px; color:#ddd; padding-top:4px;">Description:</label>
      <textarea id="saveDialogDesc" style="flex:1; height:90px; padding:5px 8px; border:none; border-radius:4px; font-size:13px; resize:none;"></textarea>
    </div>

    <div style="margin-bottom:16px; display:flex; align-items:center; gap:8px;">
      <input type="checkbox" id="saveDialogDraft" style="width:16px; height:16px;"/>
      <label for="saveDialogDraft" style="color:#ddd;">Draft</label>
    </div>

    <div style="text-align:center; margin-bottom:8px;">
      <span id="saveStatus" style="font-size:11px; color:#ffcc88;"></span>
    </div>

    <div style="display:flex; justify-content:center; gap:12px;">
      <button id="saveCancel" style="background:#444; color:#fff; border:none; border-radius:4px; padding:7px 24px; font-size:13px; cursor:pointer;">cancel</button>
      <button id="saveFinal" style="background:#333; color:#fff; border:none; border-radius:4px; padding:7px 24px; font-size:13px; cursor:pointer;">save</button>
    </div>

  </div>
</div>

<!-- app.js and save.js at the bottom, after DOM and db are ready -->
<script src="app.js"></script>
<script src="/js/save.js"></script>

</body>
