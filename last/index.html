<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Last toons - Toonator.com</title>
  <link rel="shortcut icon" href="/img/favicon-eyes.png"/>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/css/font.css">
  <link rel="stylesheet" href="/css/images.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const db = createClient(
      'https://ytyhhmwnnlkhhpvsurlm.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0eWhobXdubmxraGhwdnN1cmxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzcwNTAsImV4cCI6MjA4ODU1MzA1MH0.XZVH3j6xftSRULfhdttdq6JGIUSgHHJt9i-vXnALjH0'
    );
  </script>
  <script src="/js/auth.js"></script>
  <script src="/js/russian-users.js"></script>
  <script>
    async function loadIncludes() {
      const header = await fetch('/includes/header.html').then(r => r.text());
      const footer = await fetch('/includes/footer.html').then(r => r.text());
      const donate = await fetch('/includes/donate.html').then(r => r.text());
      const modal  = await fetch('/includes/auth-modal.html').then(r => r.text());
      document.getElementById('donate_placeholder').innerHTML = donate;
      document.getElementById('header_placeholder').innerHTML = header;
      document.getElementById('footer_placeholder').innerHTML = footer;
      document.body.insertAdjacentHTML('beforeend', modal);
      updateAuthUI();
    }
    loadIncludes();
  </script>
</head>
<body>
<div id="donate_placeholder"></div>
<div id="header_placeholder"></div>

<div id="content_wrap">
  <div id="content">

    <div class="content_left">
      <h1>
        <a href="/last/" class="nmenu selected">Oldschool</a> |
        <a href="/last/color/" class="nmenu">Colorfull</a> |
        <a href="/last/sandbox/" class="nmenu">Sandbox</a>
      </h1>

      <div class="paginator" id="paginator-top"></div>

      <div class="toons_container">
        <div class="toons_list" id="toons-list">
          <div style="text-align:center;color:#888;padding:20px;">Loading...</div>
        </div>
      </div>

      <div class="paginator" id="paginator-bottom"></div>
    </div>

    <div class="content_right">
      <h1><a href="/goodplace/">Good Place</a></h1>
      <div id="good-place-toon"></div>

      <h1>Last comments</h1>
      <div id="last-comments"></div>
    </div>

    <div class="clear"></div>
  </div>
  <div id="footer_placeholder"></div>
</div>

<script>
  const SUPABASE_URL = 'https://ytyhhmwnnlkhhpvsurlm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl0eWhobXdubmxraGhwdnN1cmxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5NzcwNTAsImV4cCI6MjA4ODU1MzA1MH0.XZVH3j6xftSRULfhdttdq6JGIUSgHHJt9i-vXnALjH0';
  const TOONS_PER_PAGE = 12;

  async function apiFetch(path) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1${path}`, {
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!res.ok) return null;
    return res.json();
  }

  async function rpc(fn, params) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/rpc/${fn}`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(params)
    });
    if (!res.ok) return null;
    return res.json();
  }

  function getPage() {
    return parseInt(new URLSearchParams(window.location.search).get('page') || '1', 10);
  }

  function escapeHTML(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  function previewUrl(id, size = 100) {
    return `${SUPABASE_URL}/storage/v1/object/public/previews/${id}_${size}.gif`;
  }

  function toonCardHTML(toon, username) {
    const frames = Array.isArray(toon.frames) ? toon.frames : (toon.frames ? Object.values(toon.frames) : []);
    const frameCount = frames.length;
    const frameStr = frameCount >= 50 ? `<b>${frameCount}</b> frames` : `${frameCount} frames`;
    const commentCount = toon.comment_count || 0;
    const commentStr = commentCount > 0
      ? `${commentCount} comment${commentCount !== 1 ? 's' : ''}`
      : `<span class="grayb">No comments</span>`;
    const medal = toon.featured ? `<img class="toonmedal" src="/img/medal.gif"/>` : '';
    const title = escapeHTML(toon.title || 'Untitled');
    return `
      <div class="toon_preview owned">
        ${medal}
        <div class="toon_image">
          <a href="/toon/${toon.id}" title="${title}">
            <img alt="${title}" title="${title}" src="${previewUrl(toon.id)}">
          </a>
        </div>
        <div class="toon_name"><a class="link" href="/toon/${toon.id}">${title}</a></div>
        <div class="toon_tagline">
          <a href="/user/${escapeHTML(username)}" class="username foreign">${escapeHTML(username)}</a>,
          ${frameStr}
        </div>
        <div class="toon_tagline">${commentStr}</div>
      </div>`;
  }

  function paginatorHTML(currentPage, totalPages) {
    if (totalPages <= 1) return '';
    let html = '<ul class="paginator">';
    const visible = Math.min(5, totalPages);
    for (let i = 1; i <= visible; i++) {
      html += `<li class="${i === currentPage ? 'current' : ''}"><a href="/last/?page=${i}">${i}</a></li>`;
    }
    if (totalPages > visible) html += `<li class="dots">...</li>`;
    html += '</ul>';
    return html;
  }

  async function loadToons() {
    const page = getPage();
    const from = (page - 1) * TOONS_PER_PAGE;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/animations?select=*&order=created_at.desc&offset=${from}&limit=${TOONS_PER_PAGE}`,
      { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Prefer': 'count=exact' } }
    );
    const toonsList = document.getElementById('toons-list');
    if (!res.ok) { toonsList.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">Failed to load toons.</div>'; return; }
    const toons = await res.json();
    const totalCount = parseInt(res.headers.get('Content-Range')?.split('/')[1] || '0', 10);
    if (!toons || toons.length === 0) { toonsList.innerHTML = '<div style="text-align:center;color:#888;padding:20px;">No toons yet.</div>'; return; }

    const userMap = {};
    await Promise.all(toons.map(async (toon) => {
      if (toon.user_id && !userMap[toon.user_id]) {
        const userData = await rpc('get_user_by_id', { p_user_id: toon.user_id });
        userMap[toon.user_id] = userData?.[0]?.username || 'unknown';
      }
    }));

    toonsList.innerHTML = toons.map(t => toonCardHTML(t, userMap[t.user_id] || 'unknown')).join('');
    const totalPages = Math.ceil(totalCount / TOONS_PER_PAGE);
    const pager = paginatorHTML(page, totalPages);
    document.getElementById('paginator-top').innerHTML = pager;
    document.getElementById('paginator-bottom').innerHTML = pager;
  }

  async function loadGoodPlace() {
    const toons = await apiFetch('/animations?featured=eq.true&order=created_at.desc&limit=1');
    if (!toons || toons.length === 0) return;
    const toon = toons[0];
    const userData = toon.user_id ? await rpc('get_user_by_id', { p_user_id: toon.user_id }) : null;
    const username = userData?.[0]?.username || 'unknown';
    const frames = Array.isArray(toon.frames) ? toon.frames : (toon.frames ? Object.values(toon.frames) : []);
    const commentCount = toon.comment_count || 0;
    const commentStr = commentCount > 0 ? `${commentCount} comments` : `<span class="grayb">No comments</span>`;
    const title = escapeHTML(toon.title || 'Untitled');
    document.getElementById('good-place-toon').innerHTML = `
      <div class="toon_preview large owned">
        <img class="toonmedal" src="/img/medal.gif"/>
        <div class="toon_image"><a href="/toon/${toon.id}" title="${title}"><img alt="${title}" src="${previewUrl(toon.id)}"></a></div>
        <div class="toon_name"><a class="link" href="/toon/${toon.id}">${title}</a></div>
        <div class="toon_tagline">
          <a href="/user/${escapeHTML(username)}" class="username foreign">${escapeHTML(username)}</a>,
          ${frames.length} frames
        </div>
        <div class="toon_tagline">${commentStr}</div>
      </div>`;
  }

  async function loadLastComments() {
    const comments = await apiFetch('/comments?order=created_at.desc&limit=10');
    if (!comments || comments.length === 0) return;
    document.getElementById('last-comments').innerHTML = comments.map((c, i) => {
      const uname = c.author_username || 'unknown';
      return `
  <div class="comment ${i % 2 !== 0 ? 'gray' : ''} last_comments">
    <div class="avatar">
      <a href="/toon/${c.animation_id}">
        <img src="${SUPABASE_URL}/storage/v1/object/public/previews/${c.animation_id}_100.gif" width="80"/>
      </a>
    </div>
    <div class="head">
      <a href="/user/${escapeHTML(uname)}" class="username foreign">${escapeHTML(uname)}</a>: ${escapeHTML(c.text || '')}
    </div>
  </div>`;
    }).join('');
  }

  loadToons();
  loadGoodPlace();
  loadLastComments();
</script>
</body>
</html>
